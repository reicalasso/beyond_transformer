# ─────────────────────────────────────────────────────────
# Small modern PULSE config — runs on consumer GPUs (8–12 GB)
# Useful for ablation runs and quick iteration.
# ─────────────────────────────────────────────────────────

seed: 42

hidden_size: 384
num_layers: 8
num_heads: 6
num_kv_heads: 2
ffn_mult: 2.5
conv_kernel_size: 4
swa_every: 4
swa_window_size: 256
delta_chunk_size: 64
qk_norm: true
gate_bias_init: 4.0
rope_max_seq_len: 1024
dropout: 0.0
logit_soft_cap: 30.0
z_loss_coef: 1.0e-4

batch_size: 16
grad_accum: 2
lr: 5.0e-4
weight_decay: 0.1
max_grad_norm: 1.0
max_steps: 20000
warmup_steps: 1000
eval_steps: 1000

bf16: true
fp16: false

seq_len: 256
max_samples: 100000
num_workers: 4

output_dir: ./output/pulse_small
