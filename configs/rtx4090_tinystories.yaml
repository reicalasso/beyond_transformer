# ─────────────────────────────────────────────────────────
# PULSE v3 training config — 1× RTX 4090 (24 GB), vast.ai
# Dataset: TinyStories   Arch: DualStateAttention
#
# Usage:
#   python src/pulse/train.py --config configs/rtx4090_tinystories.yaml
#   python scripts/train.py   --config configs/rtx4090_tinystories.yaml
#
# Keys map directly to train.py argparse flags (underscores).
# CLI flags always override YAML values.
# ─────────────────────────────────────────────────────────

seed: 42

# ── Model ────────────────────────────────────────────────
hidden_size: 768
num_layers: 12
num_heads: 8
ffn_mult: 2.7
kernel_size: 4
fast_decay: 0.70    # local syntax timescale (learnable per head)
slow_decay: 0.97    # semantic / long-range timescale (learnable per head)
dropout: 0.1

# ── Training ─────────────────────────────────────────────
batch_size: 16
grad_accum: 4           # effective batch = 64
lr: 6.0e-4
weight_decay: 0.1
max_grad_norm: 1.0
max_steps: 50000
warmup_steps: 2000
eval_steps: 2000

# ── Precision — Ada Lovelace has native BF16 ─────────────
bf16: true
fp16: false

# ── Data ─────────────────────────────────────────────────
seq_len: 512
max_samples: null       # use ALL TinyStories
num_workers: 8

# ── Output ───────────────────────────────────────────────
output_dir: ./output/pulse_v3_4090
